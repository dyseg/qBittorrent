<!DOCTYPE html>
<html lang="${LANG}" class="dark">

<head>
    <meta charset="UTF-8">
    <title>QBT_TR(Tracker tier editing)QBT_TR[CONTEXT=TrackerListWidget]</title>
    <link rel="stylesheet" href="css/style.css?v=${CACHEID}" type="text/css">
    <script defer src="scripts/localpreferences.js?v=${CACHEID}"></script>
    <script defer src="scripts/color-scheme.js?v=${CACHEID}"></script>
    <script>
        "use strict";

        window.addEventListener("DOMContentLoaded", (event) => {
            window.addEventListener("keydown", (event) => {
                switch (event.key) {
                    case "Enter":
                        event.preventDefault();
                        document.getElementById("editTrackerTierButton").click();
                        break;
                    case "Escape":
                        event.preventDefault();
                        window.parent.qBittorrent.Client.closeFrameWindow(window);
                        break;
                }
            });

            const searchParams = new URLSearchParams(window.location.search);
            const currentUrls = searchParams.get("tracker_urls");
            if (currentUrls === null || currentUrls.length === 0)
                return;

            document.getElementById("trackerTier").value = searchParams.get("tier");
            document.getElementById("trackerTier").focus();
            document.getElementById("trackerTier").select();            

            document.getElementById("editTrackerTierButton").addEventListener("click", (e) => {
                e.preventDefault();
                e.stopPropagation();

                fetch("api/v2/torrents/editTrackerTier", {
                        method: "POST",
                        body: new URLSearchParams({
                            hash: searchParams.get("hash"),
                            urls: currentUrls,
                            tier: document.getElementById("trackerTier").value
                        })
                    })
                    .then((response) => {
                        if (!response.ok)
                            return;

                        window.parent.qBittorrent.Client.closeFrameWindow(window);
                    });
            });
        });
    </script>
</head>

<body>
    <div style="text-align: center;">
        <br>
        <label for="trackerTier">QBT_TR(Tier:)QBT_TR[CONTEXT=TrackerListWidget]</label>
        <div style="text-align: center; padding-top: 10px;">
            <input type="number" id="trackerTier" style="width: 90%; max-width: 100px;" min="0" max="255">
        </div>
        <br>
        <input type="button" value="QBT_TR(Edit)QBT_TR[CONTEXT=HttpServer]" id="editTrackerTierButton">
    </div>
</body>

</html>
